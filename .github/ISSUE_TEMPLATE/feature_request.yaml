name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
    validations:
      required: false
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New preset
        - Existing preset improvement
        - Wizard / CLI
        - Generated project quality
        - Documentation
        - Other
    validations:
      required: true
